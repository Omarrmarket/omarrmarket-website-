<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Omarr Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Login</h1>
    <p>Welcome back to Omarr Market</p>
</header>

<div style="max-width:400px; margin:40px auto; background:white; padding:20px; border-radius:10px;">

    <input type="email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:15px;">

    <input type="password" placeholder="Password" style="width:100%; padding:12px; margin-bottom:15px;">

    <button style="width:100%; padding:12px; background:#008751; color:white; border:none; border-radius:6px;">
        Login
    </button>

    <p style="margin-top:20px; text-align:center;">
        Don't have an account?
        <a href="signup.html">Sign Up</a>
    </p>

</div>

</body>
</html>
