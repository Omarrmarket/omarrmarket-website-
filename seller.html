<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Seller Dashboard</h1>
    <p>List your products for sale</p>
</header>

<div style="max-width:500px; margin:30px auto; background:white; padding:20px; border-radius:10px;">

    <input type="text" placeholder="Product Name" style="width:100%; padding:12px; margin-bottom:15px;">

    <input type="number" placeholder="Price (₦)" style="width:100%; padding:12px; margin-bottom:15px;">

    <textarea placeholder="Product Description" style="width:100%; height:120px; padding:12px; margin-bottom:15px;"></textarea>

    <input type="file" style="margin-bottom:20px;">

    <button style="width:100%; padding:12px; background:#008751; color:white; border:none; border-radius:6px;">
        Publish Product
    </button>

</div>

</body>
</html>
