<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmarrMarket</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

.hero{
padding:50px 20px;
text-align:center;
}

.hero h1{
font-size:38px;
margin-bottom:10px;
}

.hero p{
color:#666;
}

button{
background:#111;
color:white;
border:none;
padding:15px 30px;
border-radius:8px;
font-size:18px;
margin-top:20px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
border-radius:12px;
padding:15px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
font-size:22px;
font-weight:bold;
margin-top:10px;
}

footer{
text-align:center;
padding:25px;
background:#111;
color:white;
}
</style>
</head>

<body>

<header>
<h2>OmarrMarket</h2>
</header>

<section class="hero">
<h1>Buy & Sell Anything</h1>
<p>Electronics • Jewelry • Fashion • Cars • Phones • Home Appliances</p>
<button>Shop Now</button>
</section>

<section class="products">

<div class="card">
<img src="https://picsum.photos/300/250?1">
<h3>iPhone 15 Pro</h3>
<div class="price">$850</div>
</div>

<div class="card">
<img src="https://picsum.photos/300/250?2">
<h3>Gold Necklace</h3>
<div class="price">$420</div>
</div>

<div class="card">
<img src="https://picsum.photos/300/250?3">
<h3>Gaming Laptop</h3>
<div class="price">$990</div>
</div>

<div class="card">
<img src="https://picsum.photos/300/250?4">
<h3>Smart TV</h3>
<div class="price">$620</div>
</div>

</section>

<footer>
©️ 2026 OmarrMarket
</footer>

</body>
</html>
