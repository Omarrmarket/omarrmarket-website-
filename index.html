<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omarr Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Omarr Market</h1>
    <p>Buy & Sell Easily</p>

    <nav class="navbar">
        <a href="#">🏠 Home</a>
        <a href="#">📂 Categories</a>
        <a href="#">🛒 Cart</a>
        <a href="#">👤 Login</a>
    </nav>
</header>

<div class="search-box">
    <input
        type="text"
        id="search"
        placeholder="Search products..."
        onkeyup="searchProducts()">
</div>

<div class="products">

    <div class="product">
        <img src="IMG_0091.jpeg" alt="Product">
        <h3>Product One</h3>
        <p>₦20,000</p>
        <button onclick="addToCart('Product One', 20000)">
            Add to Cart
        </button>
    </div>

    <div class="product">
        <img src="IMG_0092.webp" alt="Product">
        <h3>Product Two</h3>
        <p>₦15,000</p>
        <button onclick="addToCart('Product Two', 15000)">
            Add to Cart
        </button>
    </div>

    <div class="product">
        <img src="IMG_0093.jpeg" alt="Product">
        <h3>Product Three</h3>
        <p>₦35,000</p>
        <button onclick="addToCart('Product Three', 35000)">
            Add to Cart
        </button>
    </div>

    <div class="product">
        <img src="IMG_8234.jpeg" alt="Product">
        <h3>Product Four</h3>
        <p>₦50,000</p>
        <button onclick="addToCart('Product Four', 50000)">
            Add to Cart
        </button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
